# This file contains common pin mappings for the BigTreeTech Octopus
# and Octopus Pro boards. To use this config, start by identifying the
# micro-controller on the board - it may be an STM32F446, STM32F429,
# or an STM32H723.  Select the appropriate micro-controller in "make
# menuconfig" and select "Enable low-level configuration options". For
# STM32F446 boards the firmware should be compiled with a "32KiB
# bootloader" and a "12MHz crystal" clock reference. For STM32F429
# boards use a "32KiB bootloader" and an "8MHz crystal". For STM32H723
# boards use a "128KiB bootloader" and a "25Mhz crystal".

# See docs/Config_Reference.md for a description of parameters.

# Driver0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: PG6
position_endstop: 0
position_max: 350
homing_speed: 50


# Driver1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: PG9
position_endstop: 0
position_max: 350
homing_speed: 50


# Driver 2 (Front-Left Z)
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40         
gear_ratio: 80:16            
microsteps: 16
endstop_pin: PG10
position_max: 350            


# Driver 3 (Rear-Left Z)
[stepper_z1]
step_pin: PG4
dir_pin: !PC1                
enable_pin: !PA2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16


# Driver 4 (Rear-Right Z)
[stepper_z2]
step_pin: PF9
dir_pin: PG2                 
enable_pin: !PA3
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16


# Driver 5 (Front-Right Z)
[stepper_z3]
step_pin: PC13
dir_pin: !PF0                 
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16


# Driver 6
[extruder]
step_pin: PE2
dir_pin: !PE3                 
enable_pin: !PD4
microsteps: 16
rotation_distance: 22.67895   
gear_ratio: 50:10            
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0 
sensor_pin: PF4 
sensor_type: PT1000           


#[filament_switch_sensor material_0]
#switch_pin: PG12


#[filament_switch_sensor material_1]
#switch_pin: PG13


#[filament_switch_sensor material_2]
#switch_pin: PG14


# Driver7
#[extruder3]
#step_pin: PE6
#dir_pin: PA14
#enable_pin: !PE0
#heater_pin: PB11 # HE3
#sensor_pin: PF7 # T3
#...


#[filament_switch_sensor material_3]
#switch_pin: PG15

[heater_bed]
heater_pin: PA1
sensor_pin: PF3 # TB
sensor_type: ATC Semitec 104GT-2
control: pid
min_temp: 0
max_temp: 130

[fan]
pin: PA8

#[heater_fan fan1]
#pin: PE5

#[heater_fan fan2]
#pin: PD12

#[heater_fan fan3]
#pin: PD13

#[heater_fan fan4]
#pin: PD14

#[controller_fan fan5]
#pin: PD15

[mcu]
#serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
canbus_uuid: 82b80d1b9217
# CAN bus is also available on this board

[printer]
kinematics: corexy 
max_velocity: 300
max_accel: 3000
max_z_velocity: 15
max_z_accel: 350

