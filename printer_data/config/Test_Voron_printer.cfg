[include mainsail.cfg]

########################################
# Mcu Temperature monitoring 
########################################


#Raspberry Pi temperature monitoring 
[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100


#Octopus_Mcu v1.1 h723 temperature monitoring 
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100


# H36 Board Temperature
[temperature_sensor Toolhead]
sensor_type: temperature_mcu
sensor_mcu: toolhead

########################################
# Mcu Boards
########################################


[mcu]
#serial: /dev/serial/by-id/<your-mcu-id>
canbus_uuid: 82b80d1b9217


[mcu toolhead]
canbus_uuid: 

########################################
# Printer configuration
########################################


[virtual_sdcard]
path: /home/voron/printer_data/gcodes
on_error_gcode: CANCEL_PRINT


[printer]
kinematics: corexy
max_velocity: 300
max_accel: 5000
max_z_velocity: 15
max_z_accel: 350
square_corner_velocity: 5


# Accelerometer 
[adxl345]
cs_pin: toolhead:PB12
spi_software_sclk_pin: toolhead:PB13
spi_software_mosi_pin: toolhead:PB15
spi_software_miso_pin: toolhead:PB14
axes_map: x,y,z # Adjust based on mounting orientation


# Extruder
[extruder]
step_pin: toolhead:PB3
dir_pin: toolhead:PB4
enable_pin: !toolhead:PB5
microsteps: 16
rotation_distance: 22.678  # Tune for your specific extruder (e.g., CW2/Galileo)
gear_ratio: 50:10          # For Stealthburner / Clockwork 2
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: toolhead:PA6
sensor_type: Generic 3950  # Check your specific hotend thermistor
sensor_pin: toolhead:PA0
min_temp: 10
max_temp: 270


# Part Cooling Fan
[fan]
pin: toolhead:PA7


# Hotend Fan
[heater_fan hotend_fan]
pin: toolhead:PB10
heater: extruder
heater_temp: 50.0


# Safe Home
[safe_z_home]
home_xy_position: 175,175 # Center of bed
speed: 80
z_hop: 10


# Quad Gantry Level
[quad_gantry_level]
gantry_corners:
   -60,-10
   410,420
points:
   50,25
   50,325
   300,325
   300,25
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10


# Bed Heater
[heater_bed]
heater_pin: PA1
sensor_pin: PF3 # TB
sensor_type: ATC Semitec 104GT-2
control: pid
min_temp: -200
max_temp: 130


# Probe
[probe]
pin: toolhead:PB7
x_offset: 0
y_offset: 25.0
z_offset: 0
speed: 10.0
samples: 3


########################################
# Stepper Driver configuration
########################################


# Driver 0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
#endstop_pin: PG6
position_endstop: 0
position_max: 350
homing_speed: 50
endstop_pin: ^toolhead:PB6

# Driver 1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: ^PG9
position_endstop: 0
position_max: 350
homing_speed: 50

# Drive 2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 350
homing_speed: 8
second_homing_speed: 3


# Drive 3
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16


# Drive 4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16


# Drive 5
[stepper_z3]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16



