[include mainsail.cfg]


#Raspberry Pi temperature monitoring 
[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100


#Octopus_Mcu v1.1 h723 temperature monitoring 
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100


[mcu]
#serial: /dev/serial/by-id/<your-mcu-id>
canbus_uuid=82b80d1b9217


[virtual_sdcard]
path: /home/voron/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 1000
max_accel: 1000

# Driver 0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: PG6
position_endstop: 0
position_max: 200
homing_speed: 50

# Driver 1
[stepper_y]
step_pin: PF
dir_pin: PF
enable_pin: !PF
microsteps: 16
rotation_distance: 40
endstop_pin: PG
position_endstop: 0
position_max: 200
homing_speed: 50

# Driver 2
[stepper_z]
