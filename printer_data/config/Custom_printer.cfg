[include mainsail.cfg]

########################################
# Temperature monitoring 
########################################


#Raspberry Pi temperature monitoring 
[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100


#Octopus_Mcu v1.1 h723 temperature monitoring 
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100


# H36 Board Temperature
[temperature_sensor Toolhead]
sensor_type: temperature_mcu
sensor_mcu: toolhead

########################################
# Mcu
########################################


[mcu]
#serial: /dev/serial/by-id/<your-mcu-id>
canbus_uuid=82b80d1b9217


[mcu toolhead]
canbus_uuid=


[virtual_sdcard]
path: /home/voron/printer_data/gcodes
on_error_gcode: CANCEL_PRINT


[printer]
kinematics: corexy
max_velocity: 1000
max_accel: 1000


########################################
# Stepper Driver configuration
########################################


# Driver 0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: PG6
position_endstop: 0
position_max: 200
homing_speed: 50

# Driver 1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: PG9
position_endstop: 0
position_max: 200
homing_speed: 50

# Driver 2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 40
endstop_pin: PG10
position_endstop: 0
position_max: 200
homing_speed: 50

# Driver 3
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
microsteps: 16
rotation_distance: 40
endstop_pin: PG11
position_endstop: 0
position_max: 200
homing_speed: 50

# Driver 4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 40
endstop_pin: PG12
position_endstop: 0
position_max: 200
homing_speed: 50

# Driver 5
[stepper_z3]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 40
endstop_pin: PG13
position_endstop: 0
position_max: 200
homing_speed: 50

